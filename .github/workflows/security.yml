name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  dependency-and-secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # High/critical findings block delivery; moderate findings remain visible
      # for scheduled maintenance without making the baseline unactionable.
      - run: npm audit --audit-level=high
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  database-security:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start minimal local Supabase stack
        run: supabase start -x studio,imgproxy,inbucket,edge-runtime,logflare,vector,supavisor
      - run: supabase db reset --local
      - run: supabase test db

  zap-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      - run: npm start > /tmp/slogovo-next.log 2>&1 &
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      - name: Wait for local application
        run: |
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:3000/ >/dev/null && exit 0
            sleep 2
          done
          cat /tmp/slogovo-next.log
          exit 1
      - uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://127.0.0.1:3000
          rules_file_name: .zap/rules.tsv
          fail_action: true
          allow_issue_writing: false
