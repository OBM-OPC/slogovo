name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run type-check
      - run: npm run lint
      - run: npm run validate:database
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      # `npm run build` starts with the filesystem-complete content validator.
      - run: npm run build
